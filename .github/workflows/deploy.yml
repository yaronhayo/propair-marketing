# ProPair Marketing Site — Build & Deploy to Cloudflare Pages
#
# On push to main: builds the Astro site and deploys to Cloudflare Pages.
# Cloudflare Pages serves the site at mypropair.com and www.mypropair.com
# with automatic HTTPS via Cloudflare's global CDN.
#
# Required GitHub Secrets:
#   CLOUDFLARE_ACCOUNT_ID             — Cloudflare account ID
#   CLOUDFLARE_API_TOKEN              — API token with Pages:Edit permission
#   PUBLIC_FIREBASE_API_KEY           — Firebase client API key (propair-prod)
#   PUBLIC_FIREBASE_AUTH_DOMAIN       — propair-prod.firebaseapp.com
#   PUBLIC_FIREBASE_PROJECT_ID        — propair-prod
#   PUBLIC_FIREBASE_STORAGE_BUCKET    — propair-prod.firebasestorage.app
#   PUBLIC_FIREBASE_MESSAGING_SENDER_ID — 265412841094
#   PUBLIC_FIREBASE_APP_ID            — Firebase web app ID
#   PUBLIC_FIREBASE_MEASUREMENT_ID    — GA measurement ID
#
# Cloudflare Pages Setup:
#   1. dash.cloudflare.com → Workers & Pages → Create → Pages → Direct Upload
#   2. Project name: propair-marketing
#   3. After first deploy, go to Custom Domains → add mypropair.com and www.mypropair.com
#   4. DNS records are auto-configured since domain is already on Cloudflare

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          cat > .env << EOF
          PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID=${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Build
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=propair-marketing --commit-dirty=true
