# ProPair Marketing Site — Build & Deploy to Hostinger
#
# On push to main: builds the Astro site and pushes the dist/ output
# to the `build` branch. Hostinger's Git auto-deployment pulls from
# that branch into public_html.
#
# Required GitHub Secrets:
#   PUBLIC_FIREBASE_API_KEY           — Firebase client API key (propair-prod)
#   PUBLIC_FIREBASE_AUTH_DOMAIN       — propair-prod.firebaseapp.com
#   PUBLIC_FIREBASE_PROJECT_ID        — propair-prod
#   PUBLIC_FIREBASE_STORAGE_BUCKET    — propair-prod.firebasestorage.app
#   PUBLIC_FIREBASE_MESSAGING_SENDER_ID — 265412841094
#   PUBLIC_FIREBASE_APP_ID            — Firebase web app ID
#   PUBLIC_FIREBASE_MEASUREMENT_ID    — GA measurement ID
#
# Hostinger Setup:
#   1. hPanel → Websites → mypropair.com → Git
#   2. Repository: https://github.com/yaronhayo/propair-marketing.git
#   3. Branch: build
#   4. Enable Auto Deployment
#   5. Copy the Webhook URL → add as GitHub webhook (push events)

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Push to Hostinger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          cat > .env << EOF
          PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID=${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EOF

      - name: Build
        run: npx astro build

      - name: Push build to deploy branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: build
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build: ({sha}) {msg}"
